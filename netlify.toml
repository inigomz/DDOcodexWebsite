[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "itemlist_enriched/**",
    "augmentlist/**",
    "setlist/**",
    "filigreelist/**"
  ]

[dev]
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
  framework = "#custom"
